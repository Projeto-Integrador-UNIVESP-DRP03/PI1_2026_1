<h2>Cliente não encontrado</h2>

<form action="/cadastrar_cliente" method="post">

<h3>Dados do cliente</h3>

<label>CPF / CNPJ</label>
<input name="cod_cliente" value="{{cod_cliente}}" readonly>

<br><br>

<label>Nome</label>
<input name="nome" required>

<br><br>

<h3>Telefone</h3>

<label>Telefone</label>
<input name="telefone">

<br><br>

<h3>Endereço</h3>

<label>Rua</label>
<input name="rua">

<br><br>

<label>Número</label>
<input name="numero">

<br><br>

<label>Bairro</label>
<input name="bairro">

<br><br>

<label>Cidade</label>
<input name="cidade">

<br><br>

<label>Estado</label>
<input name="estado" maxlength="2">

<br><br>

<label>CEP</label>
<input name="cep">

<br><br>

<button type="submit">
Cadastrar cliente
</button>

</form>

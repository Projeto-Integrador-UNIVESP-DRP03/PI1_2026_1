{% extends "base.html" %}

{% block title %}
{{ "Editar Veículo" if veiculo else "Cadastrar Veículo" }}
{% endblock %}

{% block page_title %}
{{ "Editar Veículo" if veiculo else "Cadastrar Veículo" }}
{% endblock %}

{% block content %}

<div class="card">

    <form method="POST" action="{{ url_for('main.salvar_veiculo') }}">

        <input type="hidden" name="id_cliente" value="{{ id_cliente }}">

        <input type="hidden"
               name="id_veiculo"
               value="{{ veiculo.id_veiculo if veiculo else '' }}">

        <label for="placa">Placa</label>
        <input 
            type="text"
            id="placa"
            name="placa"
            value="{{ veiculo.placa if veiculo else '' }}"
            required
        >

        <label for="marca">Marca</label>
        <input 
            type="text"
            id="marca"
            name="marca"
            value="{{ veiculo.marca if veiculo else '' }}"
            required
        >

        <label for="modelo">Modelo</label>
        <input 
            type="text"
            id="modelo"
            name="modelo"
            value="{{ veiculo.modelo if veiculo else '' }}"
            required
        >

        <label for="ano">Ano</label>
        <input 
            type="number"
            id="ano"
            name="ano"
            value="{{ veiculo.ano if veiculo else '' }}"
        >

        <label for="cor">Cor</label>
        <input 
            type="text"
            id="cor"
            name="cor"
            value="{{ veiculo.cor if veiculo else '' }}"
        >

        <br><br>

        <button type="submit">
            {{ "Atualizar veículo" if veiculo else "Salvar veículo" }}
        </button>

    </form>

</div>

{% endblock %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zito Tapeçaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Manrope', system-ui, sans-serif; background: radial-gradient(circle at top, #0f172a 0%, #111827 45%, #0b1220 100%); }
        .title-font { font-family: 'Barlow Condensed', 'Manrope', system-ui, sans-serif; letter-spacing: 0.06em; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.35); }
        .floaty { position: absolute; border-radius: 999px; filter: blur(0.5px); opacity: 0.6; animation: float 12s ease-in-out infinite; }
        .floaty.one { width: 180px; height: 180px; background: #1e3a8a; top: 10%; left: 8%; animation-delay: 0s; }
        .floaty.two { width: 260px; height: 260px; background: #e11d2e; bottom: 12%; right: 10%; animation-delay: 2s; }
        .floaty.three { width: 120px; height: 120px; background: #0ea5e9; top: 55%; left: 45%; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-18px) translateX(12px); }
        }
        .input-icon { position: relative; }
        .input-icon i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .input-icon input { width: 100%; padding: 0.85rem 1rem 0.85rem 2.75rem; border: 1px solid #e2e8f0; border-radius: 1rem; transition: all 0.2s; background: #f8fafc; }
        .input-icon input:focus { outline: none; border-color: #e11d2e; box-shadow: 0 0 0 4px rgba(225,29,46,0.12); background: #ffffff; }
        .btn-login { background: linear-gradient(135deg, #e11d2e 0%, #b91c1c 60%, #1e3a8a 100%); transition: all 0.2s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(225, 29, 46, 0.55); }
        .login-logo { width: auto; height: 100px; }
        .shake { animation: shake 0.25s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <div class="floaty one"></div>
    <div class="floaty two"></div>
    <div class="floaty three"></div>

    <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8 relative z-10">
        <div class="text-white flex flex-col justify-center px-4">
            <div class="mb-6">
                <h1 class="title-font text-5xl lg:text-6xl font-bold mt-4">Gestão de pedidos e serviços</h1>
            </div>
            <div class="flex gap-3 text-slate-300 text-sm">
                <div class="flex items-center gap-2"><i class="fas fa-check-circle text-emerald-400"></i> Gerenciamento de prazos</div>
                <div class="flex items-center gap-2"><i class="fas fa-check-circle text-emerald-400"></i> Controle por indicadores</div>
            </div>
        </div>

        <div class="glass rounded-3xl p-10 shadow-2xl">
            <div class="text-center mb-8">
                <div class="mb-6 flex justify-center" style="height: 100px;">
                    <img src="{{ url_for('static', filename='imagens/Identidade_visual/logo_aplicacao.png') }}" alt="logo_aplicacao" class="login-logo">
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Acesso ao sistema</h2>
            </div>
            <form id="loginForm" class="space-y-4">
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="usuario" placeholder="Usuário" required>
                </div>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>
                <div id="loginError" class="text-sm text-red-600 hidden">Usuário ou senha inválidos.</div>
                <button type="submit" class="btn-login w-full text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        // Se já estiver autenticado, redireciona
        if (localStorage.getItem('zitoAuthV1')) {
            window.location.href = "index.html";
        }

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            loginError.classList.add("hidden");
            const usuario = document.getElementById('usuario').value.trim();
            const senha = document.getElementById('senha').value.trim();

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha })
                });
                if (response.ok) {
                    const user = await response.json();
                    localStorage.setItem('zitoAuthV1', JSON.stringify(user));
                    window.location.href = "index.html";
                } else {
                    loginError.classList.remove("hidden");
                    loginForm.classList.remove("shake");
                    void loginForm.offsetWidth;
                    loginForm.classList.add("shake");
                }
            } catch (error) {
                console.error('Erro ao conectar ao servidor:', error);
                alert('Erro ao conectar ao servidor. Verifique se o backend está rodando.');
            }
        });
    </script>
</body>
</html>

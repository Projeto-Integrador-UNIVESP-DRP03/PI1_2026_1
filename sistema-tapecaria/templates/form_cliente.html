{% extends "base.html" %}

{% block title %}
{{ titulo }}
{% endblock %}

{% block page_title %}
{{ titulo }}
{% endblock %}

{% block content %}

<div class="card">

    <form method="POST"
          action="{{ url_for(acao, id_cliente=cliente.id_cliente if cliente else None) }}">

        <label for="cod_cliente">CPF/CNPJ</label>
        <input 
            type="text"
            id="cod_cliente"
            name="cod_cliente"
            value="{{ cliente.cod_cliente if cliente else cod_cliente }}"
            {% if cliente %}readonly{% endif %}
        >

        <label for="nome">Nome</label>
        <input 
            type="text"
            id="nome"
            name="nome"
            value="{{ cliente.nome if cliente else '' }}"
        >

        <label for="telefone">Telefone</label>
        <input 
            type="text"
            id="telefone"
            name="telefone"
            value="{{cliente.telefones[0].telefone if cliente.telefones else ' '}}"
        >

        <label for="rua">Rua</label>
        <input 
            type="text"
            id="rua"
            name="rua"
            value="{{ cliente.enderecos[0].rua if cliente and cliente.enderecos else '' }}"
        >

        <label for="numero">Número</label>
        <input 
            type="text"
            id="numero"
            name="numero"
            value="{{ cliente.enderecos[0].numero if cliente and cliente.enderecos else '' }}"
        >

        <label for="bairro">Bairro</label>
        <input 
            type="text"
            id="bairro"
            name="bairro"
            value="{{ cliente.enderecos[0].bairro if cliente and cliente.enderecos else '' }}"
        >

        <label for="cidade">Cidade</label>
        <input 
            type="text"
            id="cidade"
            name="cidade"
            value="{{ cliente.enderecos[0].cidade if cliente and cliente.enderecos else '' }}"
        >

        <label for="estado">Estado</label>
        <input 
            type="text"
            id="estado"
            name="estado"
            value="{{ cliente.enderecos[0].estado if cliente and cliente.enderecos else '' }}"
        >

        <label for="cep">CEP</label>
        <input 
            type="text"
            id="cep"
            name="cep"
            value="{{ cliente.enderecos[0].cep if cliente and cliente.enderecos else '' }}"
        >

        <label for="complemento">Complemento</label>
        <input 
            type="text"
            id="complemento"
            name="complemento"
            value="{{ cliente.enderecos[0].complemento if cliente and cliente.enderecos else '' }}"
        >

        <br><br>

        <button type="submit">
            {{ botao }}
        </button>

    </form>

</div>

{% endblock %}

{% block content %}

                    <div class="input-group">

                        </div>

                        <label for="rua">Rua</label>

                    </div>

                    </div>

                                value="{{ cliente.enderecos[0].bairro if cliente and cliente.enderecos else '' }}"

                            <input type="text" id="cidade" name="cidade" class="form-input"
                                value="{{ cliente.enderecos[0].cidade if cliente and cliente.enderecos else '' }}"

                                    cliente.enderecos[0].estado=='AC' %}selected{% endif %}>Acre</option>
                                <option value="AL" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='AL' %}selected{% endif %}>Alagoas</option>
                                <option value="AP" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='AP' %}selected{% endif %}>Amapá</option>
                                <option value="AM" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='AM' %}selected{% endif %}>Amazonas</option>
                                <option value="BA" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='BA' %}selected{% endif %}>Bahia</option>
                                <option value="CE" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='CE' %}selected{% endif %}>Ceará</option>
                                <option value="DF" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='DF' %}selected{% endif %}>Distrito Federal</option>
                                <option value="ES" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='ES' %}selected{% endif %}>Espírito Santo</option>
                                <option value="GO" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='GO' %}selected{% endif %}>Goiás</option>
                                <option value="MA" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='MA' %}selected{% endif %}>Maranhão</option>
                                <option value="MT" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='MT' %}selected{% endif %}>Mato Grosso</option>
                                <option value="MS" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='MS' %}selected{% endif %}>Mato Grosso do Sul</option>
                                <option value="MG" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='MG' %}selected{% endif %}>Minas Gerais</option>
                                <option value="PA" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='PA' %}selected{% endif %}>Pará</option>
                                <option value="PB" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='PB' %}selected{% endif %}>Paraíba</option>
                                <option value="PR" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='PR' %}selected{% endif %}>Paraná</option>
                                <option value="PE" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='PE' %}selected{% endif %}>Pernambuco</option>
                                <option value="PI" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='PI' %}selected{% endif %}>Piauí</option>
                                <option value="RJ" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='RJ' %}selected{% endif %}>Rio de Janeiro</option>
                                <option value="RN" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='RN' %}selected{% endif %}>Rio Grande do Norte</option>
                                <option value="RS" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='RS' %}selected{% endif %}>Rio Grande do Sul</option>
                                <option value="RO" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='RO' %}selected{% endif %}>Rondônia</option>
                                <option value="RR" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='RR' %}selected{% endif %}>Roraima</option>
                                <option value="SC" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='SC' %}selected{% endif %}>Santa Catarina</option>
                                <option value="SP" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='SP' %}selected{% endif %}>São Paulo</option>
                                <option value="SE" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='SE' %}selected{% endif %}>Sergipe</option>
                                <option value="TO" {% if cliente and cliente.enderecos and
                                    cliente.enderecos[0].estado=='TO' %}selected{% endif %}>Tocantins</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

        </form>
    </div>
</div>

<script>
    // Máscara para CPF/CNPJ
    const codClienteInput = document.getElementById('cod_cliente');
    if (codClienteInput) {
        codClienteInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 11) {
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            } else {
                value = value.replace(/^(\d{2})(\d)/, '$1.$2');
                value = value.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
                value = value.replace(/\.(\d{3})(\d)/, '.$1/$2');
                value = value.replace(/(\d{4})(\d)/, '$1-$2');
            }
            e.target.value = value;
        });
    }

    // Máscara para telefone
    const telefoneInput = document.getElementById('telefone');
    if (telefoneInput) {
        telefoneInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 10) {
                value = value.replace(/(\d{2})(\d)/, '($1) $2');
                value = value.replace(/(\d{4})(\d)/, '$1-$2');
            } else {
                value = value.replace(/(\d{2})(\d)/, '($1) $2');
                value = value.replace(/(\d{5})(\d)/, '$1-$2');
            }
            e.target.value = value;
        });
    }

    // Máscara para CEP
    const cepInput = document.getElementById('cep');
    if (cepInput) {
        cepInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');

            // Aplica a máscara
            if (value.length > 5) {
                value = value.replace(/^(\d{5})(\d)/, '$1-$2');
            }
            e.target.value = value;

            // Se tiver 8 dígitos (sem contar o traço), busca o CEP
            const cleanCep = value.replace(/\D/g, '');
            if (cleanCep.length === 8) {
                buscarCep(cleanCep);
            }
        });
    }

    function buscarCep(cep) {
        // Campos a serem preenchidos
        const ruaInput = document.getElementById('rua');
        const bairroInput = document.getElementById('bairro');
        const cidadeInput = document.getElementById('cidade');
        const estadoInput = document.getElementById('estado');

        // Mostra um indicador visual de carregamento (opcional, mas bom para UX)
        [ruaInput, bairroInput, cidadeInput, estadoInput].forEach(input => {
            input.placeholder = "Buscando...";
            input.classList.add('loading-field');
        });

        fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(response => response.json())
            .then(data => {
                if (data.erro) {
                    alert("CEP não encontrado.");
                    return;
                }

                // Preenche os campos
                if (ruaInput) ruaInput.value = data.logradouro || '';
                if (bairroInput) bairroInput.value = data.bairro || '';
                if (cidadeInput) cidadeInput.value = data.localidade || '';
                if (estadoInput) {
                    // Tenta selecionar o estado no dropdown
                    estadoInput.value = data.uf || '';
                }

                // Foca no número se a rua foi preenchida
                if (data.logradouro) {
                    document.getElementById('numero').focus();
                }
            })
            .catch(error => {
                console.error("Erro ao buscar CEP:", error);
                alert("Erro ao consultar o CEP. Verifique sua conexão.");
            })
            .finally(() => {
                // Limpa o placeholder e a classe de carregamento
                [ruaInput, bairroInput, cidadeInput, estadoInput].forEach(input => {
                    input.placeholder = "";
                    input.classList.remove('loading-field');

                    // Restaura placeholders originais se necessário
                    if (input.id === 'rua') input.placeholder = "Digite o logradouro";
                    if (input.id === 'bairro') input.placeholder = "Digite o bairro";
                    if (input.id === 'cidade') input.placeholder = "Digite a cidade";
                });
            });
    }
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Ordem de Serviço</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f9f9f9;
        }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 20px;
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <h2>Cadastrar Ordem de Serviço</h2>

    <p><strong>Cliente:</strong> {{ cliente.nome }}</p>
    <p><strong>Veículo:</strong> {{ veiculo.placa }}</p>

    <form action="{{ url_for('main.cadastrar_ordem_servico', id_cliente=cliente.id_cliente, id_veiculo=veiculo.id_veiculo) }}" method="POST">
        <input type="hidden" name="id_veiculo" value="{{ id_veiculo }}">

        <label for="data_abertura">Data de Abertura:</label>
        <input type="date" id="data_abertura" name="data_abertura">

        <label for="quantidade_bancos">Quantidade de Bancos:</label>
        <input type="number" id="quantidade_bancos" name="quantidade_bancos">

        <label for="padrao_veiculo">Padrão do Veículo:</label>
        <select id="padrao_veiculo" name="padrao_veiculo">
            <option value="true">Sim</option>
            <option value="false">Não</option>
        </select>

        <label for="personalizacao_igual">Personalização Igual:</label>
        <select id="personalizacao_igual" name="personalizacao_igual">
            <option value="true">Sim</option>
            <option value="false">Não</option>
        </select>

        <label for="observacoes">Observações:</label>
        <textarea id="observacoes" name="observacoes" rows="4"></textarea>

        <button type="submit">Salvar Ordem de Serviço</button>
    </form>

</body>
</html>

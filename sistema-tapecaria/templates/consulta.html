<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Consultar Cliente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 120px;
            color: #000;
        }

        h1, h2 {
            color: #000;
            margin-bottom: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo {
            width: 200px;
            height: auto;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(20, 95, 129, 0.274);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 300px;
        }

        button {
            background-color: #3498db;
            color: #fff;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #2980b9;
        }

        .footer-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .footer-buttons a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo">
        <div>
            <h1>Consultar Cliente</h1>
            <h2>Zito Tapeçaria</h2>
        </div>
    </div>

    <div class="card">
        <form action="/buscar" method="post">
            <label for="cod_cliente"><strong>Pesquisa por CPF ou CNPJ:</strong></label>
            <input type="text" id="cod_cliente" name="cod_cliente" placeholder="Digite o CPF ou CNPJ">
            <button type="submit">Pesquisar</button>
        </form>
    </div>

    <div class="footer-buttons">
        <a href="/clientes">
            <button>Listar todos os clientes</button>
        </a>
    </div>

</body>
</html>

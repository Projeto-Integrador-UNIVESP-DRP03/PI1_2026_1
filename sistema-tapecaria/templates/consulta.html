{% extends "base.html" %}

{% block title %}
Consultar Cliente
{% endblock %}


{% block page_title %}
{% endblock %}


{% block content %}

<div class="search-wrapper">

    <div class="card search-container">

        <div class="home-header">
            <img src="{{ url_for('static', filename='imagens/Identidade_visual/logo_zito.png') }}"
                 alt="Zito Tapeçaria"
                 class="logo-home">
        </div>

        <form action="{{ url_for('main.buscar') }}" method="post" class="search-form">

            <label for="cod_cliente" class="search-label">
                Consultar Cliente
            </label>

            <input 
                type="text"
                id="cod_cliente"
                name="cod_cliente"
                placeholder="Digite o CPF ou CNPJ"
                required
                class="form-input"
            >

            <button type="submit" class="btn-primary">
                Pesquisar
            </button>

        </form>

    </div>

</div>

{% endblock %}

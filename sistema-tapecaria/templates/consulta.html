{% extends "base.html" %}

{% block title %}
Consultar Cliente
{% endblock %}


{% block page_title %}

<div class="home-header">

    <img src="{{ url_for('static', filename='imagens/Identidade_visual/logo_zito.png') }}"
         alt="Zito Tapeçaria"
         class="logo-home">

    <h1>Consultar Cliente</h1>

</div>

{% endblock %}


{% block content %}

<div class="search-wrapper">

    <div class="card search-container">

        <form action="{{ url_for('main.buscar') }}" method="post" class="search-form">

            <label for="cod_cliente">
                CPF ou CNPJ
            </label>

            <input 
                type="text"
                id="cod_cliente"
                name="cod_cliente"
                placeholder="Digite o CPF ou CNPJ"
                required
            >

            <button type="submit" class="btn-primary">
                Pesquisar
            </button>

        </form>

    </div>

</div>

{% endblock %}
